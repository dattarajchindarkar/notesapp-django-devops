services:
  db:
    image: mysql:8.0
    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notes_db
      MYSQL_USER: django
      MYSQL_PASSWORD: django123

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - django-network

  django:
    build:
      context: .
    container_name: django-app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - django-network

  nginx:
    build:
      context: ./nginx
    container_name: nginx

    ports:
      - "80:80"

    depends_on:
      - django

    restart: unless-stopped

    networks:
      - django-network

volumes:
  mysql-data:

networks:
  django-network:
  

